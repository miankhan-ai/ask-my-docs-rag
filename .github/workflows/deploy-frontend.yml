name: Deploy frontend to Hostinger

# Builds the React/Vite frontend and uploads the static output to Hostinger via
# FTP whenever frontend code changes on the default branch. The backend is
# hosted separately on Hugging Face Spaces.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER    - Hostinger FTP host (e.g. ftp.miankhan.me or the IP from hPanel)
#   FTP_USERNAME  - FTP account username (from hPanel → Files → FTP Accounts)
#   FTP_PASSWORD  - FTP account password
# Required repository variable:
#   VITE_API_BASE - backend URL, e.g. https://miankhan-ai-ask-my-docs-backend.hf.space
#
# Adjust server-dir below to your domain's web root (commonly the subdomain's
# folder, e.g. /public_html/askmydocs/ or /domains/.../public_html/).

on:
  push:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm ci || npm ci || npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build

      - name: Deploy to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Hostinger requires explicit FTPS (TLS over the standard FTP port 21).
          protocol: ftps
          port: 21
          timeout: 60000
          # The FTP account's home directory IS public_html, so server-dir is
          # relative to it — do NOT prefix public_html again (that nests it).
          local-dir: ./frontend/dist/
          server-dir: askmydocs/
          dangerous-clean-slate: false
